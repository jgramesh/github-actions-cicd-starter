name: Day 10 - Release Branch to Staging

on:
  push:
    branches:
      - 'release/*'

jobs:
  release-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm run verify
        env:
          APP_ENV: test
      - run: ./scripts/deploy.sh staging
