name: Day 15 - Full Production Pipeline

on:
  push:
    branches: [main]

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm test
        env:
          APP_ENV: test
      - run: npm run build
      - run: npm audit --audit-level=high

  deploy-production:
    runs-on: ubuntu-latest
    needs: quality-and-security
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm run build
      - run: ./scripts/deploy.sh production
      - name: Verify production artifact
        run: test -f deployments/production/build-info.json
